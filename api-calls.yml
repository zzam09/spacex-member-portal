project:
  name: SpaceX Member Portal
  framework: Next.js 16 + React 19 + TypeScript + Supabase
  summary: Member management portal with Next.js route handlers and Supabase-backed member API helpers.

api_surface:
  - app/api/members/route.ts
  - app/api/members/[id]/route.ts
  - src/lib/api/members.ts
  - src/lib/queries.ts

api_calls:
  - id: get-members-list
    kind: route
    method: GET
    path: /api/members
    file: app/api/members/route.ts
    summary: Returns the current member list.
    response:
      status: 200
      shape:
        members: []
        count: 0

  - id: create-member
    kind: route
    method: POST
    path: /api/members
    file: app/api/members/route.ts
    summary: Creates a new member record.
    request_body:
      email: string
      name: string
      tier: string
      status: string
    response:
      status: 201
      shape:
        message: Member created
        member: object

  - id: get-member-by-id
    kind: route
    method: GET
    path: /api/members/{id}
    file: app/api/members/[id]/route.ts
    summary: Returns one member by identifier.
    path_params:
      id: string
    response:
      status: 200
      shape:
        id: string
        message: Member fetched

  - id: update-member-by-id
    kind: route
    method: PUT
    path: /api/members/{id}
    file: app/api/members/[id]/route.ts
    summary: Updates the selected member.
    path_params:
      id: string
    response:
      status: 200
      shape:
        id: string
        message: Member updated
        member: object

  - id: delete-member-by-id
    kind: route
    method: DELETE
    path: /api/members/{id}
    file: app/api/members/[id]/route.ts
    summary: Deletes the selected member.
    path_params:
      id: string
    response:
      status: 200
      shape:
        id: string
        message: Member deleted

  - id: get-current-member
    kind: client-helper
    method: supabase.from('members').select('*').eq('email', email).single()
    file: src/lib/api/members.ts
    summary: Get the current authenticated member by email.
    params:
      email: string
    returns: ApiResponse<Member>
    notes:
      - Validates the email first
      - Returns NOT_FOUND or FORBIDDEN-style failure responses

  - id: list-members
    kind: client-helper
    method: supabase.from('members').select('*').order('created_at', { ascending: false })
    file: src/lib/api/members.ts
    summary: List all members; admin-only access is enforced by RLS.
    returns: ApiResponse<Member[]>

  - id: search-members
    kind: client-helper
    method: supabase.from('members').select('*', { count: 'exact' })
    file: src/lib/api/members.ts
    summary: Search and filter members with pagination and admin-only access.
    params:
      query: string
      status: ACTIVE | PENDING | SUSPENDED
      tier: Explorer | Pioneer | Vanguard
      role: member | admin
      limit: number
      offset: number
    returns: ApiResponse<{ data: Member[]; total: number }>

  - id: create-member-helper
    kind: client-helper
    method: supabase.from('members').insert([validated]).select().single()
    file: src/lib/api/members.ts
    summary: Create a new member (admin only).
    params:
      email: string
      name: string
      tier: Explorer | Pioneer | Vanguard
      status: ACTIVE | PENDING | SUSPENDED
      role: member | admin
      title: string
      location: string
      member_since: YYYY-MM-DD
    returns: ApiResponse<Member>

  - id: update-member-helper
    kind: client-helper
    method: supabase.from('members').update(validated).eq('id', id).select().single()
    file: src/lib/api/members.ts
    summary: Update an existing member (admin only).
    params:
      id: string
      input: partial member fields
    returns: ApiResponse<Member>

  - id: delete-member-helper
    kind: client-helper
    method: supabase.from('members').delete().eq('id', id)
    file: src/lib/api/members.ts
    summary: Delete a member (admin only).
    params:
      id: string
    returns: ApiResponse<{ id: string }>

  - id: get-member-stats
    kind: client-helper
    method: supabase.from('members').select('status, tier, role')
    file: src/lib/api/members.ts
    summary: Get member statistics such as totals, statuses, roles, and tier breakdowns.
    returns: ApiResponse<MemberStats>

notes:
  - The app also includes database query helpers in src/lib/queries.ts for member listing, creation, update, deletion, search, and profile access.
  - The route handlers in app/api/members are lightweight placeholders, while the main member API logic lives in the Supabase helper layer under src/lib/api/members.ts.
